server:
  port: 8084
  address: 0.0.0.0
spring:
  application:
    name: order-service
  datasource:
    url: jdbc:h2:mem:order_service_db;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
  cloud:
    stream:
      default-binder: test
eureka:
  client:
    enabled: false
