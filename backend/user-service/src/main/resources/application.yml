server:
  port: 8082
  address: 0.0.0.0
spring:
  application:
    name: user-service
  datasource:
    url: jdbc:h2:mem:user_service_db;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
  cloud:
    stream:
      enabled: false
eureka:
  client:
    enabled: false
