server:
  port: 8082
  address: 0.0.0.0
spring:
  application:
    name: user-service
  datasource:
    url: jdbc:h2:mem:user_db;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
eureka:
  client:
    enabled: false
