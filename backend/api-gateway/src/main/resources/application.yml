server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      httpclient:
        connect-timeout: 2000
        response-timeout: 10s
      routes:
        - id: auth-service
          uri: http://127.0.0.1:8083
          predicates:
            - Path=/api/auth/**
        - id: user-service
          uri: http://127.0.0.1:8082
          predicates:
            - Path=/api/users/**, /api/utilisateurs/**
        - id: product-service
          uri: http://127.0.0.1:8081
          predicates:
            - Path=/api/products/**
        - id: order-service
          uri: http://127.0.0.1:8084
          predicates:
            - Path=/api/orders/**
        - id: payment-service
          uri: http://127.0.0.1:8085
          predicates:
            - Path=/api/payments/**
        - id: delivery-service
          uri: http://127.0.0.1:8086
          predicates:
            - Path=/api/deliveries/**

eureka:
  client:
    enabled: false
