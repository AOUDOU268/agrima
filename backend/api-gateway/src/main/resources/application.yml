server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://127.0.0.1:8083
          predicates:
            - Path=/api/auth/**
        - id: user-service
          uri: http://127.0.0.1:8082
          predicates:
            - Path=/api/users/**
        - id: product-service
          uri: http://127.0.0.1:8081
          predicates:
            - Path=/api/products/**, /api/categories/**
        - id: order-service
          uri: http://127.0.0.1:8084
          predicates:
            - Path=/api/orders/**
        - id: payment-service
          uri: http://127.0.0.1:8085
          predicates:
            - Path=/api/payments/**
        - id: delivery-service
          uri: http://127.0.0.1:8086
          predicates:
            - Path=/api/deliveries/**
        - id: notification-service
          uri: http://127.0.0.1:8088
          predicates:
            - Path=/api/notifications/**
        - id: chat-service
          uri: http://127.0.0.1:8092
          predicates:
            - Path=/api/chat/**

eureka:
  client:
    enabled: true
